theme = "FixIt"
title = "Samir Paul"
baseURL = "https://samirpaulb.github.io/"
locale = "en"
languageName = "English"
defaultContentLanguage = "en"
timeZone = "Asia/Kolkata"
timeout = "5m"

# Enable emoji shortcodes in content
enableEmoji = true

# Disable unnecessary language processing for better performance
hasCJKLanguage = false

# Let Hugo generate robots.txt from template
enableRobotsTXT = true

# Enable Git info for lastmod dates (improves SEO with accurate lastmod in sitemap)
enableGitInfo = true

# Performance: Disable unused taxonomy pages
disableKinds = []

# -------------------------------------------------------------------------------------
# Front Matter Configuration
# -------------------------------------------------------------------------------------

[frontmatter]
lastmod = ["lastmod", ":git", ":fileModTime", ":default"]

# ============================================================================
# BUILD & MINIFICATION CONFIGURATION (Performance Optimization)
# ============================================================================

[build]
  writeStats = true
  noJSConfigInAssets = true
  useResourceCacheWhen = "fallback"

[minify]
  disableCSS = false
  disableHTML = false
  disableJS = false
  disableJSON = false
  disableSVG = true
  disableXML = false
  minifyOutput = true
  [minify.tdewolff]
    [minify.tdewolff.css]
      precision = 0
    [minify.tdewolff.html]
      keepComments = false
      keepSpecialComments = true
      keepDefaultAttrVals = true
      keepDocumentTags = true
      keepEndTags = true
      keepQuotes = false
      keepWhitespace = false
    [minify.tdewolff.js]
      keepVarNames = false
      precision = 0
    [minify.tdewolff.json]
      precision = 0
    [minify.tdewolff.svg]
      precision = 2
      keepComments = false
    [minify.tdewolff.xml]
      keepWhitespace = false

# ============================================================================
# MENU CONFIGURATION
# ============================================================================

[[menus.main]]
  identifier = "posts"
  name = "Posts"
  url = "/posts/"
  title = ""
  weight = 1
  [menus.main.params]
    icon = "fa-solid fa-archive"

[[menus.main]]
  identifier = "categories"
  name = "Categories"
  url = "/categories/"
  title = ""
  weight = 2
  [menus.main.params]
    icon = "fa-solid fa-folder-tree"

[[menus.main]]
  identifier = "tags"
  name = "Tags"
  url = "/tags/"
  title = ""
  weight = 3
  [menus.main.params]
    icon = "fa-solid fa-tags"

[[menus.main]]
  identifier = "about"
  name = "About"
  url = "/about/"
  title = ""
  weight = 5
  [menus.main.params]
    icon = "fa-solid fa-user"

[[menus.main]]
  identifier = "daily"
  name = "Daily"
  url = "/daily/"
  title = ""
  weight = 4
  [menus.main.params]
    icon = "fa-solid fa-newspaper"

# ============================================================================
# SITE PARAMETERS
# ============================================================================

[params]
  # FixIt theme version
  version = "0.4.X"
  # site description
  description = "A place to share learnings, ideas, short notes, guides, and reflections from projects and everyday life, focused on clarity and usefulness. Lessons learned and experiences are distilled into actionable takeaways for curious readers."
  # site keywords
  keywords = ["Samir Paul", "Personal Blog", "Software Engineering", "Computer Science", "System Design", "Learnings", "Data Structures Algorithms", "Networking", "Artificial Intelligence", "Problem-solving", "Coding Interview Prep", "AI/ML", "Experience", "Travel"]
  # site default theme ("light", "dark", "auto")
  defaultTheme = "auto"
  # which hash function used for SRI, when empty, no SRI is used
  fingerprint = ""
  # date format
  dateFormat = "02-Jan-2006"
  # website images for Open Graph and Twitter Cards
  images = ["/screenshot.png"]
  # enable PWA support
  enablePWA = true
  # whether to add external Icon for external links automatically
  externalIcon = false
  # whether to capitalize titles
  capitalizeTitles = false
  # whether to add site title to the title of every page
  withSiteTitle = true
  # title delimiter when the site title is be added to the title of every page
  titleDelimiter = "-"
  # whether to add site subtitle to the title of index page
  indexWithSubtitle = false
  # whether to enable tooltip replacement for elements with title attribute
  tooltip = true
  # whether to inject FixIt theme meta tag
  disableThemeInject = false
  # License information
  license = '<a rel="license external nofollow noopener noreferrer" href="https://creativecommons.org/licenses/by-nc-nd/4.0/" target="_blank">CC BY-NC-ND 4.0</a>'

  # ----------------------------------------------------------------------------
  # Author Configuration
  # ----------------------------------------------------------------------------
  [params.author]
    name = "Samir Paul"
    email = "netproxy@duck.com"
    link = "/about/"
    avatar = "/avatar.webp"

  # ----------------------------------------------------------------------------
  # Git Info Configuration
  # ----------------------------------------------------------------------------
  [params.gitInfo]
    repo = ""
    branch = "main"
    dir = "content"

  # ----------------------------------------------------------------------------
  # App Icon Configuration (PWA)
  # ----------------------------------------------------------------------------
  [params.app]
    title = "Samir Paul"
    noFavicon = false
    svgFavicon = ""
    iconColor = "#5bbad5"
    tileColor = "#da532c"
    [params.app.themeColor]
      light = "#f8f8f8"
      dark = "#252627"

  # ----------------------------------------------------------------------------
  # Search Configuration (Fuse.js - Client-side)
  # ----------------------------------------------------------------------------
  [params.search]
    enable = true
    # type of search engine ("algolia", "fuse", "cse", "post-chat")
    type = "fuse"
    contentLength = 4000
    placeholder = "Search titles or contents"
    maxResultLength = 10
    snippetLength = 30
    highlightTag = "em"
    absoluteURL = false
    [params.search.algolia]
      index = ""
      appID = ""
      searchKey = ""
    [params.search.fuse]
      isCaseSensitive = false
      minMatchCharLength = 2
      findAllMatches = false
      location = 0
      threshold = 0.3
      distance = 100
      ignoreLocation = false
      useExtendedSearch = false
      ignoreFieldNorm = false

  # ----------------------------------------------------------------------------
  # Image Optimization Configuration
  # ----------------------------------------------------------------------------
  [params.image]
    cacheRemote = true
    optimise = true

  # ----------------------------------------------------------------------------
  # Code Block Configuration
  # ----------------------------------------------------------------------------
  [params.codeblock]
    wrapper = true
    mode = "classic"
    maxShownLines = 30
    copyable = true
    lineNosToggler = true
    lineWrapToggler = false

  # ----------------------------------------------------------------------------
  # Header Configuration
  # ----------------------------------------------------------------------------
  [params.header]
    desktopMode = "sticky"
    mobileMode = "auto"
    [params.header.title]
      logo = ""
      name = "~samir"
      pre = ""
      post = " 🌱"
      typeit = false
    [params.header.subtitle]
      name = ""
      typeit = false

  # ----------------------------------------------------------------------------
  # Breadcrumb Configuration
  # ----------------------------------------------------------------------------
  [params.breadcrumb]
    enable = true
    sticky = false
    showHome = true

  # ----------------------------------------------------------------------------
  # Navigation Configuration
  # ----------------------------------------------------------------------------
  [params.navigation]
    inSection = false

  # ----------------------------------------------------------------------------
  # Footer Configuration
  # ----------------------------------------------------------------------------
  [params.footer]
    enable = true
    copyright = true
    author = true
    since = 2020
    icp = ""
    license = '<a rel="license external nofollow noopener noreferrer" href="https://creativecommons.org/licenses/by-nc-nd/4.0/" target="_blank">CC BY-NC-ND 4.0</a>'
    [params.footer.powered]
      enable = false
      hugoLogo = false
      themeLogo = false
    [params.footer.siteTime]
      enable = false
      animate = true
      icon = "fa-solid fa-heartbeat"
      pre = ""
      value = "2020-01-01T00:00:00+05:30"

  # ----------------------------------------------------------------------------
  # Archives Page Configuration
  # ----------------------------------------------------------------------------
  [params.archives]
    paginate = 20
    dateFormat = "01-02"

  # ----------------------------------------------------------------------------
  # Section (All Posts) Page Configuration
  # ----------------------------------------------------------------------------
  [params.section]
    paginate = 20
    dateFormat = "02-Jan-2006"
    [params.section.feed]
      limit = -1
      fullText = false

  # ----------------------------------------------------------------------------
  # List (Category or Tag) Page Configuration
  # ----------------------------------------------------------------------------
  [params.list]
    paginate = 20
    dateFormat = "02-Jan-2006"
    [params.list.feed]
      limit = -1
      fullText = false

  # ----------------------------------------------------------------------------
  # Recently Updated Configuration
  # ----------------------------------------------------------------------------
  [params.recentlyUpdated]
    archives = true
    section = true
    list = true
    days = 30
    maxCount = 10

  # ----------------------------------------------------------------------------
  # Home Page Configuration
  # ----------------------------------------------------------------------------
  [params.home]
    [params.home.profile]
      enable = true
      gravatarEmail = ""
      avatarURL = "/avatar.webp"
      avatarMenu = ""
      title = ""
      subtitle = "Welcome! This is my little hypertext garden — make yourself at home."
      typeit = true
      social = true
      disclaimer = '<style>[data-theme="dark"] .home-banner-img{filter:invert(1)}.header-title-text{font-family:"SF Mono","Fira Code","Cascadia Code","JetBrains Mono","Menlo","Consolas","DejaVu Sans Mono",monospace;font-size:0.95em}.home-subtitle,.home-subtitle .typeit{font-family:"Ink Free","Bradley Hand","Noteworthy",Georgia,serif;font-size:1.15rem}</style><div style="margin-top:0.7rem;max-width:700px;width:100%;margin-left:auto;margin-right:auto"><img class="home-banner-img" src="/banner.svg" alt="Welcome banner" fetchpriority="high" decoding="async" width="701" height="183" style="width:100%;height:auto;border-radius:4px;pointer-events:none;user-select:none" draggable="false" oncontextmenu="return false"></div><svg style="display:block;margin:0.8rem auto -1rem;width:75%;height:8px;opacity:0.4" viewBox="0 0 240 10" preserveAspectRatio="xMidYMid meet"><path d="M0 5 C10 0 10 0 20 5 C30 10 30 10 40 5 C50 0 50 0 60 5 C70 10 70 10 80 5 C90 0 90 0 100 5 C110 10 110 10 120 5 C130 0 130 0 140 5 C150 10 150 10 160 5 C170 0 170 0 180 5 C190 10 190 10 200 5 C210 0 210 0 220 5 C230 10 230 10 240 5" fill="none" stroke="#888" stroke-width="1.2"/></svg>'
    [params.home.posts]
      enable = true
      paginate = 7
      imagePreview = false

  # ----------------------------------------------------------------------------
  # Social Media Links (Author Profile)
  # ----------------------------------------------------------------------------
  [params.social]
    GitHub = "SamirPaulb"
    Linkedin = "samirpaul"
    Twitter = "SamirPaulb"
    Instagram = "SamirPaulb"
    RSS = true

  # ----------------------------------------------------------------------------
  # TypeIt Animation Configuration
  # ----------------------------------------------------------------------------
  [params.typeit]
    speed = 100
    cursorSpeed = 1000
    cursorChar = "|"
    duration = -1
    loop = false

  # ----------------------------------------------------------------------------
  # Search Engine Verification Codes (SEO)
  # ----------------------------------------------------------------------------
  [params.verification]
    google = "vJAOBxbJTCK2vXG-hLFeGsoC9hXgFlCpuJJ8AcJLROQ"
    bing = "1A92FC2EC113F8616A21D76DA684A133"
    yandex = "fe6a06c57be84984"
    pinterest = "24bac6e1fbf1750de40d59bb788d9dd9"
    baidu = ""
    so = ""
    sogou = ""

  # ----------------------------------------------------------------------------
  # Site SEO Configuration (Schema.org)
  # ----------------------------------------------------------------------------
  [params.seo]
    image = "/og-image.png"
    thumbnailUrl = "/screenshot.png"

  # ----------------------------------------------------------------------------
  # Pace - Page loading progress bar
  # ----------------------------------------------------------------------------
  [params.pace]
    enable = true
    color = "blue"
    theme = "minimal"

  # ----------------------------------------------------------------------------
  # Analytics (DISABLED - privacy-first, using custom Vercount instead)
  # ----------------------------------------------------------------------------
  [params.analytics]
    enable = false

  # ----------------------------------------------------------------------------
  # Cookie Consent (DISABLED - enable if adding tracking)
  # ----------------------------------------------------------------------------
  [params.cookieconsent]
    enable = false
    [params.cookieconsent.content]
      message = "This website uses cookies to enhance your experience."
      dismiss = "Got it!"
      link = "/privacy/"

  # ----------------------------------------------------------------------------
  # Busuanzi / Vercount Page View Counter (Custom Cloudflare Worker)
  # ----------------------------------------------------------------------------
  [params.busuanzi]
    enable = true
    source = "https://web.samirpaul.workers.dev/views/js"
    siteViews = true
    pageViews = true

  # ----------------------------------------------------------------------------
  # Back to Top
  # ----------------------------------------------------------------------------
  [params.backToTop]
    enable = true
    scrollpercent = true

  # ----------------------------------------------------------------------------
  # Reading Progress Bar
  # ----------------------------------------------------------------------------
  [params.readingProgress]
    enable = true
    start = "left"
    position = "top"
    reversed = false
    light = ""
    dark = ""
    height = "2px"

  # ----------------------------------------------------------------------------
  # Tag Cloud
  # ----------------------------------------------------------------------------
  [params.tagcloud]
    enable = true
    min = 14
    max = 32
    peakCount = 10
    orderby = "name"

  # ----------------------------------------------------------------------------
  # GitHub Corner
  # ----------------------------------------------------------------------------
  [params.githubCorner]
    enable = false

  # ----------------------------------------------------------------------------
  # Feed Configuration (RSS)
  # ----------------------------------------------------------------------------
  [params.feed]
    limit = 10
    fullText = true

  # ----------------------------------------------------------------------------
  # Custom Partials Configuration
  # ----------------------------------------------------------------------------
  [params.customPartials]
    head = []
    menuDesktop = []
    menuMobile = []
    profile = []
    aside = []
    comment = []
    footer = ["custom/footer-links.html"]
    widgets = []
    assets = []
    postFooterBefore = []
    postFooterAfter = []

  # ----------------------------------------------------------------------------
  # Page Configuration (Default Settings for All Pages)
  # ----------------------------------------------------------------------------
  [params.page]
    authorAvatar = true
    hiddenFromHomePage = false
    hiddenFromSearch = false
    hiddenFromRelated = false
    hiddenFromFeed = false
    twemoji = false
    lightgallery = true
    ruby = true
    fraction = true
    fontawesome = true
    linkToMarkdown = false
    linkToSource = false
    linkToEdit = false
    linkToReport = false
    linkToVscode = false
    pageStyle = "wide"
    autoBookmark = false
    showLastmod = true
    wordCount = true
    readingTime = true
    endFlag = ""
    instantPage = true
    collectionList = false
    collectionNavigation = false
    license = '<a rel="license external nofollow noopener noreferrer" href="https://creativecommons.org/licenses/by-nc-nd/4.0/" target="_blank">CC BY-NC-ND 4.0</a>'

    # Display a message at the beginning of an article to warn the reader that its content might be expired
    [params.page.expirationReminder]
      enable = true
      reminder = 180
      warning = 365
      closeComment = false

    # Table of the contents config
    [params.page.toc]
      enable = true
      keepStatic = false
      auto = true
      position = "right"

    # Mathematical formulas configuration
    [params.page.math]
      enable = false
      type = "katex"
      [params.page.math.katex]
        copyTex = true
        throwOnError = false
        errorColor = "#ff4949"

    # Related content config
    [params.page.related]
      enable = true
      count = 5

    # Social share links in post page
    [params.page.share]
      enable = true
      Twitter = true
      Facebook = true
      Linkedin = true
      Reddit = true
      Whatsapp = true
      Pinterest = true
      HackerNews = true
      Line = false
      Weibo = false
      Tumblr = false
      VK = false
      Buffer = false
      Xing = false
      Instapaper = false
