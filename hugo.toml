    # Page SEO config
    [params.page.seo]
      images = []
      [params.page.seo.publisher]
        name = "Samir Paul"
        logoUrl = "/logo.png"


# ============================================================================
# MARKUP CONFIGURATION (Syntax Highlighting & Goldmark)
# ============================================================================

[markup]
  # Syntax Highlighting
  [markup.highlight]
    codeFences = true
    noClasses = false
    anchorLineNos = false
    guessSyntax = true
    lineNos = true
    lineNumbersInTable = true
  # Goldmark is from Hugo 0.60 the default library used for Markdown
  [markup.goldmark]
    [markup.goldmark.extensions]
      definitionList = true
      footnote = true
      linkify = true
      strikethrough = true
      table = true
      taskList = true
      typographer = true
      [markup.goldmark.extensions.extras.delete]
        enable = true
      [markup.goldmark.extensions.extras.insert]
        enable = true
      [markup.goldmark.extensions.extras.mark]
        enable = true
      [markup.goldmark.extensions.extras.subscript]
        enable = true
      [markup.goldmark.extensions.extras.superscript]
        enable = true
      [markup.goldmark.extensions.passthrough]
        enable = true
      [markup.goldmark.extensions.passthrough.delimiters]
        block = [['\[', '\]'], ['$$', '$$']]
        inline = [['\(', '\)'], ['$', '$']]
    [markup.goldmark.parser.attribute]
      block = true
      title = true
    [markup.goldmark.renderer]
      unsafe = true
  # Table Of Contents settings
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 6


# ============================================================================
# SITEMAP CONFIGURATION (SEO)
# ============================================================================

[sitemap]
  changefreq = "weekly"
  filename = "sitemap.xml"
  priority = 0.5


# ============================================================================
# PERMALINKS CONFIGURATION (URL Structure)
# ============================================================================

[permalinks]
  [permalinks.page]
    posts = "posts/:contentbasename"


# ============================================================================
# PRIVACY CONFIGURATION (GDPR Compliance)
# ============================================================================

[privacy]
  [privacy.x]
    enableDNT = true
  [privacy.youtube]
    privacyEnhanced = true


# ============================================================================
# OUTPUT CONFIGURATION
# ============================================================================

[outputs]
  home = ["html", "rss", "archives", "offline", "search"]
  page = ["html", "markdown"]
  section = ["html", "rss"]
  taxonomy = ["html"]
  term = ["html", "rss"]


# ============================================================================
# TAXONOMIES CONFIGURATION
# ============================================================================

[taxonomies]
  category = "categories"
  tag = "tags"
  series = "series"
  collection = "collections"


# ============================================================================
# IMAGING CONFIGURATION
# ============================================================================

[imaging]
  quality = 75


# ============================================================================
# RELATED CONTENT CONFIGURATION
# ============================================================================

[related]
  includeNewer = false
  threshold = 80
  toLower = false

  [[related.indices]]
    applyFilter = false
    cardinalityThreshold = 0
    name = "keywords"
    pattern = ""
    toLower = false
    type = "basic"
    weight = 100

  [[related.indices]]
    applyFilter = false
    cardinalityThreshold = 0
    name = "date"
    pattern = ""
    toLower = false
    type = "basic"
    weight = 10

  [[related.indices]]
    applyFilter = false
    cardinalityThreshold = 0
    name = "tags"
    pattern = ""
    toLower = false
    type = "basic"
    weight = 80

  [[related.indices]]
    applyFilter = false
    name = "fragmentrefs"
    type = "fragments"
    weight = 80
