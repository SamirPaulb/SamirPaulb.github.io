name: Daily Digest — Partial Build

# ──────────────────────────────────────────────────────────────────────────────
# Triggered on push to main when the commit message contains "[digest-only]"
# (set by daily-digest.yml when pushing the daily digest submodule pointer).
#
# Strategy — avoids a full site rebuild:
#   1. Restore public/ from the cache saved by the last full build (hugo.yml)
#   2. Run `hugo --renderSegments digest` — overlays ONLY /daily-digest/* pages
#      onto the restored public/ directory
#   3. Deploy the combined result via GitHub Pages artifact API
#
# If no cache exists (first run, or cache expired), falls back to a full build
# and saves a new cache so the next digest-only run can use segment mode.
#
# Full build (hugo.yml) still runs for all non-digest changes.
# ──────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Only run when the commit is tagged [digest-only] (pushed by daily-digest.yml), or manually
    if: |
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.head_commit.message, '[digest-only]')
    env:
      HUGO_VERSION: 0.159.2

    steps:
      - name: Install Hugo CLI
        run: |
          wget -O ${{ runner.temp }}/hugo.deb \
            https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb \
          && sudo dpkg -i ${{ runner.temp }}/hugo.deb

      - name: Install Dart Sass
        run: |
          curl -sL "https://github.com/sass/dart-sass/releases/download/1.85.0/dart-sass-1.85.0-linux-x64.tar.gz" -o /tmp/dart-sass.tar.gz
          sudo tar -xzf /tmp/dart-sass.tar.gz -C /usr/local
          echo "/usr/local/dart-sass" >> $GITHUB_PATH

      - name: Checkout blog with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          ssh-key: ${{ secrets.CONTENT_SUBMODULE_SSH_PRIVATE_KEY }}

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v6

      # ── Restore full public/ from the last full build ───────────────────────
      # Uses prefix restore-keys to find the most recently saved full build
      # regardless of which run_id created it. cache-matched-key is set to the
      # actual key found (empty string if nothing exists at all).
      - name: Restore public/ cache (from last full build)
        id: cache_restore
        uses: actions/cache/restore@v4
        with:
          path: ./public
          key: hugo-public-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            hugo-public-${{ runner.os }}-

      # ── Segment build: overlays only /daily-digest/* onto restored public/ ──
      # Runs whenever any cache was found (exact hit or prefix match).
      - name: Build digest segment (overlay on cached public/)
        if: steps.cache_restore.outputs.cache-matched-key != ''
        env:
          HUGO_CACHEDIR: ${{ runner.temp }}/hugo_cache
          HUGO_ENVIRONMENT: production
          HUGO_ENV: production
        run: |
          hugo --renderSegments digest --minify \
            --baseURL "${{ steps.pages.outputs.base_url }}"
          echo "BUILD_MODE=segment" >> "$GITHUB_ENV"

      # ── Full build fallback (no cache at all) ──────────────────────────────
      # Runs only when cache-matched-key is empty (cache expired or first ever run).
      # Builds everything including daily-digest pages, then saves a fresh cache
      # so the next digest-only run can use segment mode instead.
      - name: Full build + save cache (cold start)
        if: steps.cache_restore.outputs.cache-matched-key == ''
        env:
          HUGO_CACHEDIR: ${{ runner.temp }}/hugo_cache
          HUGO_ENVIRONMENT: production
          HUGO_ENV: production
        run: |
          hugo --minify --gc \
            --baseURL "${{ steps.pages.outputs.base_url }}"
          echo "BUILD_MODE=full-fallback" >> "$GITHUB_ENV"

      - name: Save public/ cache after cold-start full build
        if: steps.cache_restore.outputs.cache-matched-key == ''
        uses: actions/cache/save@v4
        with:
          path: ./public
          key: hugo-public-${{ runner.os }}-${{ github.run_id }}

      - name: Log build mode
        run: echo "Build mode: $BUILD_MODE"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
